{% extends "base.html" %}

{% block title %}
    {% if note %}Edit Note{% else %}Add New Note{% endif %}
{% endblock %}

{% block content %}
    <h1>{% if note %}Edit Note{% else %}Add New Note{% endif %}</h1>
    <form method="POST">
        <div class="form-group">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" value="{{ note.title if note else '' }}" required>
        </div>
        <div class="form-group">
            <label for="content">Content:</label>
            <textarea id="content" name="content" rows="5" required>{{ note.content if note else '' }}</textarea>
        </div>
        <button type="submit" class="btn">{% if note %}Update Note{% else %}Add Note{% endif %}</button>
        <a href="{{ url_for('index') }}" class="btn btn-danger">Cancel</a>
    </form>
{% endblock %}
