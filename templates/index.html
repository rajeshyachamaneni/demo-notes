{% extends "base.html" %}

{% block content %}
    <h1>My Notes</h1>
    <a href="{{ url_for('add_note') }}" class="btn add-note-link">Add New Note</a>

    {% if notes %}
        {% for note in notes %}
            <div class="note">
                <h2>{{ note.title }}</h2>
                <p>{{ note.content }}</p>
                <div class="note-actions">
                    <a href="{{ url_for('edit_note', id=note.id) }}">Edit</a>
                    <a href="{{ url_for('delete_note', id=note.id) }}" onclick="return confirm('Are you sure you want to delete this note?');">Delete</a>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <p>No notes yet. Add one above!</p>
    {% endif %}
{% endblock %}
